name: QC Command Center

# Wave 5.2 of the post-analysis remediation. Runs scripts/qc-cc.sh as a CI
# gate so the dashboard never regresses on N17 (departments), N19 (ZHC
# agents/ layout), migrations, no-Anthropic policy, or persona UI presence.
#
# AF5 addition: qc-independence job asserts every QC changelog entry was
# scored by an independent agent (not the writer). Self-assessed entries
# without a following independent correction fail the gate.
#
# B.1 addition: cc-health-check-fixtures job runs the full fixture suite as a
# REQUIRED gate. Fixture regressions block the PR — a red fixture is a broken
# health check, which is worse than a broken feature.
#
# Triggers on every push to main and every PR targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qc-cc:
    name: QC Command Center
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node (for package.json version probe)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure jq is available
        run: |
          command -v jq >/dev/null 2>&1 || sudo apt-get update -y && sudo apt-get install -y jq

      - name: Run qc-cc.sh
        run: bash scripts/qc-cc.sh

  qc-independence:
    name: QC scorer independence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Self-test — planted fixture MUST fail (verifies the check bites)
        run: |
          bash scripts/check-qc-independence.sh scripts/fixtures/qc-self-assessed-fixture.md \
            && echo "ERROR: fixture should have exited 1 but exited 0 — check is broken" \
            && exit 1 \
            || echo "OK: fixture correctly detected self-assessed entry (exit 1)"

      - name: Assert CHANGELOG.md has no uncorrected self-assessed QC entries
        run: bash scripts/check-qc-independence.sh

  # B.1 REQUIRED gate: fixture suite must pass on every PR.
  # A failing fixture means cc-health-check.sh has regressed on a broken-state
  # detection or false-green case — this is more critical than a feature regression.
  #
  # FIX #8: pm2 is installed in CI so Fixtures 19 and 20 (end-to-end pm2 topology
  # with fake pm2 binaries) run as real checks, not skips.
  cc-health-check-fixtures:
    name: B.1 cc-health-check fixture suite (REQUIRED)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sqlite3 and pm2
        run: |
          command -v sqlite3 >/dev/null 2>&1 || (sudo apt-get update -y && sudo apt-get install -y sqlite3)
          # Install pm2 so Fixture 19/20 (fake-pm2 binary) and Fixture 0-pm2 (full green path)
          # run as real assertions, not skips.
          npm install -g pm2 2>/dev/null || true
          command -v pm2 >/dev/null 2>&1 && echo "pm2 installed: $(pm2 --version)" || echo "pm2 not available"

      - name: Mark cc-health-check.sh executable
        run: chmod +x scripts/cc-health-check.sh

      - name: Run cc-health-check fixture suite (bash 4)
        run: |
          # Ubuntu ships bash 5+, so the bash 4 guard is satisfied.
          # Fixtures 19/20 use a fake pm2 binary injected into PATH — pm2_topology
          # end-to-end assertions run even when no real CC app is deployed.
          # Fixture 0-pm2 (full green=true path) is attempted when pm2 is installed.
          CI_MODE=1 bash scripts/fixtures/run-cc-health-check-fixtures.sh

  build-smoke:
    name: Build smoke test
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block the QC gate on build issues — track separately.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
