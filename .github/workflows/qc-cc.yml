name: QC Command Center

# Wave 5.2 of the post-analysis remediation. Runs scripts/qc-cc.sh as a CI
# gate so the dashboard never regresses on N17 (departments), N19 (ZHC
# agents/ layout), migrations, no-Anthropic policy, or persona UI presence.
#
# AF5 addition: qc-independence job asserts every QC changelog entry was
# scored by an independent agent (not the writer). Self-assessed entries
# without a following independent correction fail the gate.
#
# Triggers on every push to main and every PR targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── U60/JM-U63b — My AI CEO off-brand color gate ────────────────────────
  # BINARY acceptance item 1: zero indigo/purple/fuchsia utility classes
  # under src/app/my-ai-ceo/ + src/components/ceo-chat/, gate fails on
  # introduction. The mutation self-test proves the scanner actually bites
  # BEFORE trusting its clean verdict on the real tree.
  ceo-chat-color-gate:
    name: My AI CEO off-brand color gate (indigo/purple/fuchsia)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Mutation self-test — a planted violation MUST fail the gate
        run: |
          node --import tsx --test tests/unit/ceo-chat-color-lint.test.ts

      - name: Run the real gate against the tree
        run: npm run lint:ceo-chat-colors

  qc-cc:
    name: QC Command Center
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node (for package.json version probe)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure jq is available
        run: |
          command -v jq >/dev/null 2>&1 || sudo apt-get update -y && sudo apt-get install -y jq

      # Round-2 fix #5 self-test: check_claude_literals() must detect a
      # double-quoted claude-* literal (the original single-quote-only regex
      # gave a false PASS on double/backtick literals).
      # Approach: run the exact grep pipeline from the function directly against
      # the fixture file — no source/eval, no shell injection surface.
      - name: Self-test check 5.1 — double-quoted claude literal MUST FAIL
        run: |
          FIXTURE="tests/fixtures/check-5.1/double-quoted-claude-literal.ts"
          # Replicate the grep pipeline from check_claude_literals() verbatim.
          # The fixture contains:  const hardcodedModel = "claude-sonnet-4-5";
          # If the pattern fires, grep exits 0 and we confirm FAIL.
          # If the pattern is silent (old single-quote-only regex), grep exits 1
          # and we abort the CI step to surface the regression.
          RESULT=$(grep -rn 'claude-' "$FIXTURE" 2>/dev/null \
            | grep -E "['\"\`]claude-[a-z0-9-]+['\"\`]" \
            | grep -vEi 'orchestrat(or|ion)' \
            | grep -v 'model-providers/anthropic.ts' \
            | grep -v 'web-agent/runner.ts' \
            || true)
          if [ -z "$RESULT" ]; then
            echo "ERROR: check 5.1 grep pattern produced zero matches on the double-quoted fixture — false PASS regression"
            exit 1
          fi
          echo "OK: check 5.1 correctly matched double-quoted claude-* literal in fixture"

      # Round-3 optional: Row 33 CF-challenge self-test.
      # cc-health-check.sh line 116 detects a 200+CF-challenge response and
      # returns CF_INDET=true (exit 3 UNKNOWN, not exit 1 RED).
      # This self-test reproduces the grep-based body check using a synthetic
      # CF Access challenge HTML body to confirm the guard fires correctly.
      - name: Self-test Row 33 — CF Access challenge body classified as UNKNOWN (not PASS)
        run: |
          # Synthetic CF Access challenge body — the real one contains these strings
          CF_BODY='<!DOCTYPE html><html><head><title>Cloudflare Access</title></head><body><h1>Cloudflare Access</h1><form action="/cdn-cgi/access/login"></form></body></html>'
          # Run the same grep check cc-health-check.sh uses at line 116
          if printf '%s' "$CF_BODY" | grep -qi 'cloudflare access\|cf-access-login\|cf_chl'; then
            echo "OK: CF-challenge body correctly detected (grep matched) — probe would classify UNKNOWN"
          else
            echo "ERROR: CF-challenge grep pattern missed the synthetic body — Row 33 UNKNOWN guard is broken"
            exit 1
          fi
          # Also verify a normal 200 app body does NOT trigger the guard
          NORMAL_BODY='<!DOCTYPE html><html><head><title>Summit Retail Enterprises</title></head><body><div id="root"></div></body></html>'
          if printf '%s' "$NORMAL_BODY" | grep -qi 'cloudflare access\|cf-access-login\|cf_chl'; then
            echo "ERROR: normal app body falsely triggered the CF-challenge guard — false UNKNOWN"
            exit 1
          else
            echo "OK: normal app body correctly bypasses CF-challenge guard — PASS classified correctly"
          fi

      - name: Run qc-cc.sh
        run: bash scripts/qc-cc.sh

  qc-independence:
    name: QC scorer independence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Self-test — planted fixture MUST fail (verifies the check bites)
        run: |
          bash scripts/check-qc-independence.sh scripts/fixtures/qc-self-assessed-fixture.md \
            && echo "ERROR: fixture should have exited 1 but exited 0 — check is broken" \
            && exit 1 \
            || echo "OK: fixture correctly detected self-assessed entry (exit 1)"

      - name: Assert CHANGELOG.md has no uncorrected self-assessed QC entries
        run: bash scripts/check-qc-independence.sh

  # ── U55: CEO-hero contract + real render-level proof ───────────────────────
  # `npm run test:unit` (the Node built-in --test glob over tests/unit/*.test.ts)
  # was not previously wired into any CI job — only the dozen suites explicitly
  # listed in vitest.config.ts ran automatically. This job closes that gap for
  # the U55/U51 CEO-hero unit specifically: the pure-function single-source
  # contract test (u55-company-health-client.test.ts), the acceptance-(3)
  # automated dead-agent-status-code scan (u55-agent-status-dead-code.test.ts),
  # the windowed-stats fixture-DB suite, the attention-classification predicate
  # suite (all via test:unit), and the REAL jsdom render-level proof for
  # CompanyHeroCard + NeedsAttentionSection (test:component) — proving U55
  # acceptance (f)/(4) actually runs in CI, not just locally.
  u55-ceo-hero-contract-tests:
    name: U55 CEO-hero contract + render-level tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests/unit/*.test.ts (Node built-in runner)
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: Run real render-level proof (jsdom + @testing-library/react)
        run: npm run test:component
        env:
          NODE_ENV: test

  # ── B.1 deep-health truth-table suite ────────────────────────────────────
  # Ports every applicable row of docs/B1-truth-table.md into vitest.
  # A wrong verdict on any row blocks merge (per the severity tier table).
  deep-health-truth-table:
    name: B.1 deep-health truth table (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest truth-table suite
        run: npm run test:vitest
        env:
          NODE_ENV: test
          # No DB or server needed — tests use mocks and temp dirs
          DATABASE_PATH: ""

      - name: F3.1 no-naked-dispatch contract test (persona invariant)
        run: bash tests/unit/no-naked-dispatch.test.sh
        env:
          NODE_ENV: test

      - name: F3.2 standup task-counting regression test (count_task_ids at every call site)
        run: bash tests/unit/standup-count-task-ids.test.sh
        env:
          NODE_ENV: test

  # ── B.1 thin-probe fixture run ─────────────────────────────────────────────
  # Exercises cc-health-check.sh against a real Next.js build + pm2-less fixture
  # to confirm the script exits 0 (green) on a known-good state and exits 1 on
  # a broken state (missing asset).  Does NOT require pm2 (pm2 check is skipped
  # when pm2 is absent; fixture covers the app-level checks).
  deep-health-probe-fixture:
    name: B.1 thin-probe fixture (cc-health-check.sh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app for fixture
        run: npm run build
        env:
          DATABASE_PATH: /tmp/probe-fixture.db

      - name: Seed fixture DB with branded company
        run: |
          node -e "
            const Database = require('better-sqlite3');
            const db = new Database('/tmp/probe-fixture.db');
            db.exec(\"CREATE TABLE IF NOT EXISTS companies (id INTEGER PRIMARY KEY, name TEXT, slug TEXT)\");
            db.exec(\"INSERT OR REPLACE INTO companies (id, name, slug) VALUES (1, 'Fixture Corp', 'fixture-corp')\");
            db.exec(\"CREATE TABLE IF NOT EXISTS _migrations (id TEXT PRIMARY KEY)\");
            db.close();
            console.log('Fixture DB seeded');
          "

      - name: Write fixture company-config.json
        run: |
          mkdir -p config
          echo '{"companyName":"Fixture Corp","slug":"fixture-corp"}' > config/company-config.json

      - name: Write pre-rendered branded index.html (html_title check)
        run: |
          # checkHtmlTitle() reads .next/server/pages/index.html (rows 8-9).
          # `next start` does not create pre-rendered HTML — inject it so the
          # html_title check returns PASS instead of indeterminate, which would
          # otherwise elevate the probe to exit 3 (UNKNOWN) instead of exit 0 (GREEN).
          mkdir -p .next/server/pages
          printf '<!DOCTYPE html><html><head><title>Fixture Corp</title></head><body></body></html>\n' \
            > .next/server/pages/index.html
          echo "Pre-rendered index.html written"

      - name: Start app for outside-in probe
        run: |
          # Bind explicitly on 0.0.0.0 so both IPv4 and IPv6 curl calls work.
          # Ubuntu runners resolve 'localhost' to ::1 (IPv6); without -H 0.0.0.0
          # the server may only accept ::1 connections and the probe's
          # --public-url http://127.0.0.1:4000 would get CF_HTTP=000.
          DATABASE_PATH=/tmp/probe-fixture.db npx next start -p 4000 -H 0.0.0.0 &
          # Wait for the server to be ready (up to 30s)
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4000/api/health && break || sleep 1
          done
        env:
          DATABASE_PATH: /tmp/probe-fixture.db
          PORT: 4000
          # Cloudflare Access enforcement (DATA-10) is OPT-IN and defaults OFF on
          # every box (v4.72.0), so this is belt-and-suspenders: there is NO
          # Cloudflare edge in front of this fixture server to inject the
          # Cf-Access-* headers, and setting it true would 401 every page GET
          # (including cc-health-check.sh's CF public-URL probe and outside-in
          # asset probe, which hit 127.0.0.1 directly) with "Cloudflare Access is
          # not active on this subdomain" → the probe would read RED. Pinning it
          # false keeps the fixture on the documented default posture regardless of
          # any inherited env. No production code or the health-check script is
          # modified.
          REQUIRE_CF_ACCESS: "false"

      - name: Run cc-health-check.sh — expect GREEN (exit 0)
        run: |
          # --public-url http://127.0.0.1:4000 so the CF probe hits the running
          # server (IPv4 explicit, avoids ::1 vs 0.0.0.0 mismatch on Ubuntu runners).
          bash scripts/cc-health-check.sh --port 4000 --public-url http://127.0.0.1:4000 --json-only
          echo "EXIT: $?"

      - name: Break the build — remove a static asset to simulate stale manifest
        run: |
          ASSET=$(ls .next/static/chunks/*.js 2>/dev/null | head -1)
          if [[ -n "$ASSET" ]]; then
            rm -f "$ASSET"
            echo "Removed asset: $ASSET"
          else
            echo "No .js asset found to remove — skipping stale-manifest fixture"
          fi

      - name: cc-health-check.sh with broken asset — expect RED (exit 1)
        run: |
          bash scripts/cc-health-check.sh --port 4000 --json-only && {
            echo "ERROR: expected exit 1 (RED) but got exit 0 (GREEN) — stale-manifest check is broken"
            exit 1
          } || {
            CODE=$?
            if [[ "$CODE" -eq 1 ]]; then
              echo "OK: correctly returned exit 1 (RED) for stale manifest"
            elif [[ "$CODE" -eq 3 ]]; then
              echo "NOTE: returned exit 3 (UNKNOWN) — acceptable if asset removal did not affect served HTML refs"
            else
              echo "Unexpected exit code $CODE"
              exit 1
            fi
          }

  duck-e2e:
    name: Duck pipeline e2e (mock generator)
    runs-on: ubuntu-latest
    # NOTE: add this job to branch-protection required-status-checks so it
    # blocks merges when the duck pipeline is broken. Steps:
    #   Settings → Branches → main protection rule → Required status checks
    #   → Add "Duck pipeline e2e (mock generator)".
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app (enables `next start` for faster e2e runs)
        run: npm run build
        env:
          # Build needs a placeholder DB path; the e2e test uses its own temp DB
          DATABASE_PATH: /tmp/duck-e2e-build.db

      - name: Run duck pipeline e2e test (mock generator mode)
        run: node --import tsx --test tests/e2e/duck-test.ts
        timeout-minutes: 5
        env:
          # DUCK_E2E_USE_REAL_KIE: unset → mock generator (CI default)
          # Set DUCK_E2E_USE_REAL_KIE=1 in a scheduled workflow for nightly
          # runs against real KIE (requires KIE_API_KEY secret).
          DUCK_E2E_USE_REAL_KIE: ""
          # ARTIFACT_PATH_VARIANT: unset → main contract (PROJECTS_PATH/<slug>/)
          # Set ARTIFACT_PATH_VARIANT=80 once PR #80 merges.
          ARTIFACT_PATH_VARIANT: ""
          # DUCK_E2E_ARTIFACT_QC: unset → heuristic QC (no LLM key in CI)
          # Set DUCK_E2E_ARTIFACT_QC=1 once PR #80 merges + QC_SCORER_MODEL configured.
          DUCK_E2E_ARTIFACT_QC: ""

  port-pin-env-bleed-guard:
    name: Port-pin and env-bleed guard (v4.42.0+)
    # Prevents re-introduction of the CC crash-loop root causes:
    #   - process.env.PORT in ecosystem → OpenClaw gateway PORT bleeds in
    #   - PORT: in env block → Hostinger injected PORT bleeds in
    #   - missing cc-start.sh → no orphan-port kill
    #   - missing circuit-breaker fields → PM2 loops forever
    # A planted fixture is used to PROVE the guard actually bites (self-test).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node (for package.json probe in check 11.10)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Self-test: the planted fixture MUST fail checks 11.1 and 11.2.
      # If the grep pattern silently misses the fixture, the guard is broken.
      - name: Self-test — bleeding-ecosystem.cjs MUST be detected by guard 11.1
        run: |
          FIXTURE="tests/fixtures/port-guard/bleeding-ecosystem.cjs"
          if ! [ -f "$FIXTURE" ]; then
            echo "ERROR: planted fixture $FIXTURE is missing — add it to the repo"
            exit 1
          fi
          # Check 11.1 pattern: process.env.PORT in active (non-comment) code must be detected.
          # The guard excludes comment lines (// and *) so the fixture must have an active-code hit.
          if grep -E 'process\.env\.PORT' "$FIXTURE" | grep -vE '^\s*(//|\*)' | grep -q .; then
            echo "OK: guard 11.1 correctly detects process.env.PORT in active code in planted fixture"
          else
            echo "ERROR: guard 11.1 pattern missed process.env.PORT in fixture active code — false PASS regression"
            exit 1
          fi
          # Check 11.2 pattern: PORT: key in env block must be detected
          if grep -qE '^\s+PORT:' "$FIXTURE"; then
            echo "OK: guard 11.2 correctly detects PORT: key in planted fixture"
          else
            echo "ERROR: guard 11.2 pattern missed PORT: key in fixture — false PASS regression"
            exit 1
          fi
          echo "Self-test PASSED — planted fixture is correctly detectable"

      # Self-test: the REAL ecosystem.config.cjs must NOT trigger the guard
      # (proves the canonical config is actually clean).
      - name: Self-test — canonical ecosystem.config.cjs must NOT trigger guard 11.1
        run: |
          # Same non-comment filter as check 11.1: active-code lines only.
          if grep -E 'process\.env\.PORT' ecosystem.config.cjs | grep -vE '^\s*(//|\*)' | grep -q .; then
            echo "ERROR: canonical ecosystem.config.cjs still contains process.env.PORT in active code — env-bleed not fixed"
            exit 1
          else
            echo "OK: canonical ecosystem.config.cjs correctly has no process.env.PORT in active code"
          fi

      - name: Run qc-cc.sh section 11 (port-pin-and-env-bleed-guard)
        run: |
          # Run the full qc-cc.sh; the job is named for section 11 but the full
          # script must pass (no regressions in other sections).
          bash scripts/qc-cc.sh

      # P1-02 Unit B, item 4: the non-4000 drift ACK guard in cc-start.sh.
      # Fail-first contract test — see the file header for the four assertions.
      - name: cc-start.sh non-4000 drift ACK guard test (P1-02 Unit B)
        run: bash tests/unit/cc-start-port-ack-guard.test.sh

  build-smoke:
    name: Build smoke test
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block the QC gate on build issues — track separately.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  # ── Authoritative client-name scan (PRD P0-3 / P2-5) ──────────────────────
  # qc-blocked-gate.sh Assertion 5 only scans the git DIFF, so client names that
  # were ALREADY committed never trip it. This job runs the tracked-file gate
  # (scripts/qc-assert-no-client-names.sh) which walks EVERY tracked file on
  # disk — the authoritative scan. A planted-fixture self-test proves the gate
  # actually bites before the real scan runs.
  no-client-names:
    name: No client names in tracked files (authoritative scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Self-test — planted placeholder name MUST fail the gate (box mode)
        run: |
          # Hermetic: copy the planted fixture (which holds an obviously-fake
          # PLACEHOLDER name + the operator path) into an isolated temp repo-root
          # under a NON-excluded name and confirm the gate exits 1. Point the gate
          # at the committed .example roster (fake placeholder names) so BOX-mode
          # detection is exercised without any real client roster. The denylisted
          # literal lives only in the self-excluded fixture, never inline here.
          TMP="$(mktemp -d)"
          cp tests/fixtures/no-client-names/planted-client-name.txt "$TMP/leak.ts"
          if OPENCLAW_CLIENT_ROSTER="$PWD/scripts/client-roster.example.txt" \
               bash scripts/qc-assert-no-client-names.sh --repo-root "$TMP"; then
            echo "ERROR: gate passed on a planted placeholder name — the check is broken"
            rm -rf "$TMP"
            exit 1
          fi
          echo "OK: gate correctly failed (exit 1) on the planted fixture"
          rm -rf "$TMP"

      # Roster absent in CI → STRUCTURAL mode: the gate must NOT fail-open. It
      # scans for the operator path + any leaked .example placeholder names,
      # WARNS that the full roster-specific scan was skipped, and passes (exit 0)
      # only when the tree is clean. The authoritative roster scan runs on
      # operator boxes / pre-commit where the roster exists.
      - name: Assert no operator paths / placeholder leaks in any tracked file (structural)
        run: bash scripts/qc-assert-no-client-names.sh

  # ── Shell script syntax guard (PRD P0-1 regression guard) ─────────────────
  # bash -n every shell script so a broken heredoc / quoting error can never
  # ship. Covers scripts/*.sh and every nested scripts dir (install/, cloudflare/,
  # integration-tests/, conversational-ai/, fleet-heartbeat/scripts/, .claude/).
  shell-syntax:
    name: Shell script syntax (bash -n) guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: bash -n every tracked shell script
        run: |
          FAIL=0
          while IFS= read -r f; do
            if bash -n "$f"; then
              echo "OK   $f"
            else
              echo "FAIL $f"
              FAIL=1
            fi
          done < <(find . -type d \( -name node_modules -o -name .git \) -prune \
                     -o -type f -name '*.sh' -print)
          if [ "$FAIL" -ne 0 ]; then
            echo "One or more shell scripts failed bash -n"
            exit 1
          fi
          echo "All shell scripts parsed cleanly."

  prove-zhe-web-e2e:
    name: prove-zhe web e2e + interview ZHE gates (P3-8)
    runs-on: ubuntu-latest
    # Proves a completed interview through THIS app produces a Zero-Human-Everything
    # -compliant build state, and FAILS loudly if any ZHE gate (consent/exit-87,
    # decision-coverage/exit-88, provenanced-decline, expected-set equality) is
    # bypassable from the web path. Runs the harness against a SANDBOXED throwaway
    # HOME so the real Skill-23 enforcers never touch a live workspace.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The gate proof drives the REAL Skill-23 enforcers (build-workforce.py,
      # department-floor.py, list-canonical-departments.py, prove-zhe.py). Point
      # OPENCLAW_SKILL23_SCRIPTS at an onboarding-skill checkout to run the FULL
      # gate; without it the harness SKIPS loudly (never a false pass). Example:
      #   - uses: actions/checkout@v4
      #     with:
      #       repository: ${{ vars.ONBOARDING_REPO }}
      #       path: _onboarding
      #   then set OPENCLAW_SKILL23_SCRIPTS below to
      #   ${{ github.workspace }}/_onboarding/23-ai-workforce-blueprint/scripts
      - name: Run prove-zhe web e2e (interview -> ZHE gate proof)
        run: npm run test:prove-zhe-web
        timeout-minutes: 6
        env:
          # Empty -> harness resolves the default skill path; if the enforcers are
          # not installed on the runner the suite SKIPS loudly rather than fake-pass.
          OPENCLAW_SKILL23_SCRIPTS: ${{ vars.OPENCLAW_SKILL23_SCRIPTS || '' }}

  # ── Interview-mode shell-lock e2e (WG-6 / WG-10c command-center half) ──────
  # Drives the REAL Edge middleware + sanctioned Node cookie-setter through a live
  # Next server in a real browser (Playwright/Chromium), proving the P0-5 / WG-9
  # lock end-to-end: locked while the interview is incomplete, exempt routes open,
  # and the dashboard unlocks once completion is signalled the sanctioned way.
  #
  # The suite is self-contained: playwright.interview-lock.config.ts stands up its
  # OWN `next dev` server (webServer{}) against a THROWAWAY fixture workspace under
  # test-results/ — never ~/.openclaw, never the operator's canonical files. It
  # runs in dev on purpose (a production build would mint a `secure` cookie that
  # http://127.0.0.1 drops, so the unlock could never be observed). GitHub Actions
  # sets CI=true, so the config uses retries: 2 + trace-on-first-retry for flake
  # control; the job timeout keeps a hung server from stalling the whole run.
  interview-lock-e2e:
    name: Interview-unlock shell-lock e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium + OS deps)
        # Only Chromium is needed (config runs headless Chromium); --with-deps
        # pulls the apt libs the runner is missing so the browser launches.
        run: npx playwright install --with-deps chromium

      - name: Run interview-unlock e2e (config boots its own dev server)
        # `test:e2e:interview-lock` -> playwright test --config=playwright.interview-lock.config.ts
        # Playwright's webServer{} builds-on-demand, starts `next dev` on :4123
        # with the fixture env, waits for /api/health, runs the specs, then tears
        # the server down. GitHub sets CI=true automatically (enables retries +
        # reuseExistingServer:false). Job-level timeout guards against a stuck boot.
        run: npm run test:e2e:interview-lock
        timeout-minutes: 12

      - name: Upload Playwright trace + fixture artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: interview-lock-e2e-traces
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
